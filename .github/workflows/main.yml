name: Build FB Lite Pro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📱 Install Platform & Build Tools
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: ⚙️ Install apktool
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apktool
          apktool --version

      - name: 🔧 Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: 🏗️ Build Spectrum AAR via Gradle
        run: |
          ./gradlew :spectrum:assembleRelease --no-daemon --stacktrace
          echo "AAR built:"
          find spectrum/build -name "*.aar" | head -5

      - name: 📦 Ekstrak DEX dari AAR
        run: |
          AAR=$(find spectrum/build -name "*.aar" | head -1)
          echo "Using AAR: $AAR"
          mkdir -p spectrum_dex
          unzip -q "$AAR" classes.jar -d spectrum_dex/
          ls -lh spectrum_dex/

          # classes.jar -> classes.dex via d8
          ANDROID_JAR=$(find $ANDROID_SDK_ROOT/platforms -name "android.jar" | sort -r | head -1)
          mkdir -p spectrum_dex/out
          $ANDROID_SDK_ROOT/build-tools/35.0.0/d8 \
            spectrum_dex/classes.jar \
            --output spectrum_dex/out \
            --classpath "$ANDROID_JAR" \
            --min-api 24

          echo "DEX: $(ls -lh spectrum_dex/out/)"

      - name: 🔓 Decompile FB Lite APK
        run: |
          ls fblite/
          apktool d fblite/Facebook_Lite.apk -o fblite_decoded --no-src -f
          echo "✅ Decompiled"

      - name: 💉 Copy Spectrum Resources ke FB Lite
        run: |
          mkdir -p fblite_decoded/res/layout
          mkdir -p fblite_decoded/res/drawable
          mkdir -p fblite_decoded/res/xml
          mkdir -p fblite_decoded/res/values
          cp spectrum/src/main/res/layout/*.xml    fblite_decoded/res/layout/   2>/dev/null || true
          cp spectrum/src/main/res/drawable/*.xml  fblite_decoded/res/drawable/ 2>/dev/null || true
          cp spectrum/src/main/res/xml/*.xml       fblite_decoded/res/xml/      2>/dev/null || true
          cp spectrum/src/main/res/values/spectrum_styles.xml fblite_decoded/res/values/ 2>/dev/null || true

          python3 << 'PYEOF'
          import re, os
          sp = 'spectrum/src/main/res/values/strings.xml'
          fb = 'fblite_decoded/res/values/strings.xml'
          if not os.path.exists(sp) or not os.path.exists(fb): exit(0)
          with open(sp) as f: s1 = f.read()
          with open(fb) as f: s2 = f.read()
          for e in re.findall(r'<string name="[^"]*">.*?</string>', s1, re.DOTALL):
              nm = re.search(r'name="([^"]*)"', e).group(1)
              if nm not in s2:
                  s2 = s2.replace('</resources>', f'    {e}\n</resources>')
          with open(fb, 'w') as f: f.write(s2)
          print("✅ Strings merged")
          PYEOF
          echo "✅ Resources done"

      - name: 💉 Inject Manifest
        run: |
          python3 << 'PYEOF'
          import re
          with open('fblite_decoded/AndroidManifest.xml','r') as f: m = f.read()
          with open('spectrum/SPECTRUM_MANIFEST_INJECT.xml','r') as f: inj = f.read()
          inj = re.sub(r'<!--.*?-->','',inj,flags=re.DOTALL).strip()
          if 'com.spectrum.v2.FloatingService' not in m:
              m = m.replace('</application>', inj+'\n</application>')
              with open('fblite_decoded/AndroidManifest.xml','w') as f: f.write(m)
              print("✅ Manifest injected")
          PYEOF

      - name: 💉 Inject Spectrum DEX ke FB Lite
        run: |
          cp spectrum_dex/out/classes.dex fblite_decoded/classes2.dex
          echo "✅ classes2.dex injected"
          ls -la fblite_decoded/*.dex

      - name: 🔨 Recompile APK
        run: |
          apktool b fblite_decoded -o FBLitePro_unsigned.apk --use-aapt2
          ls -lh FBLitePro_unsigned.apk

      - name: 🔑 Sign APK
        run: |
          keytool -genkeypair -v \
            -keystore litepro.keystore -keyalg RSA -keysize 2048 -validity 10000 \
            -alias litepro -dname "CN=LitePro,OU=Dev,O=LitePro,L=ID,S=ID,C=ID" \
            -storepass litepro123 -keypass litepro123 2>/dev/null
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks litepro.keystore --ks-pass pass:litepro123 \
            --key-pass pass:litepro123 --ks-key-alias litepro \
            --out FBLitePro_signed.apk FBLitePro_unsigned.apk
          echo "✅ $(ls -lh FBLitePro_signed.apk)"

      - name: 🏷️ Tag
        id: ver
        run: |
          TAG="v$(date +'%Y%m%d-%H%M')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          cp FBLitePro_signed.apk "FBLitePro-${TAG}.apk"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FBLitePro-${{ steps.ver.outputs.tag }}
          path: FBLitePro-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🚀 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "FB Lite Pro — ${{ steps.ver.outputs.tag }}"
          body: |
            ### ✅ FB Lite + Spectrum — 1 APK
            Setelah install: Pengaturan → Aksesibilitas → aktifkan Lite Pro
            Commit: `${{ github.sha }}`
          files: FBLitePro-*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          